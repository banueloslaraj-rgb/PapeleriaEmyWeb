<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Panel Admin - Papelería Emy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Pantalla de Login */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-form {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        
        .login-form h2 {
            color: #f5a623;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .login-form .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .login-form input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        
        .login-form input:focus {
            outline: none;
            border-color: #f5a623;
        }
        
        .login-form button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f5a623, #f39c12);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
        }
        
        .login-form button:hover {
            background: #e67e22;
        }
        
        .error-message {
            color: #dc3545;
            margin-top: 15px;
            font-size: 14px;
            padding: 10px;
            background: #ffe6e6;
            border-radius: 8px;
        }
        
        .success-message {
            color: #28a745;
            margin-top: 15px;
            font-size: 14px;
            padding: 10px;
            background: #e6ffe6;
            border-radius: 8px;
        }
        
        .volver-link {
            display: inline-block;
            margin-top: 20px;
            color: #f5a623;
            text-decoration: none;
            font-size: 14px;
        }
        
        .volver-link:hover {
            text-decoration: underline;
        }
        
        /* Dashboard */
        .dashboard {
            display: none;
        }
        
        .admin-header {
            background: linear-gradient(135deg, #f5a623, #f39c12);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .admin-header h1 {
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 30px;
        }
        
        .logout {
            background: rgba(255,255,255,0.3);
            padding: 6px 15px;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        
        .logout:hover {
            background: rgba(255,255,255,0.5);
        }
        
        /* Estadísticas */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-card h4 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .stat-card h3 {
            font-size: 36px;
            color: #f5a623;
            margin: 10px 0;
        }
        
        /* Filtros */
        .filtros {
            background: white;
            margin: 20px 25px;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filtros input, .filtros select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            flex: 1;
            min-width: 180px;
        }
        
        .filtros input:focus, .filtros select:focus {
            outline: none;
            border-color: #f5a623;
        }
        
        .filtros button {
            padding: 12px 25px;
            background: #f5a623;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .filtros button:hover {
            background: #e67e22;
        }
        
        /* Tabla */
        .pedidos-table {
            background: white;
            margin: 20px 25px;
            border-radius: 15px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #f5a623;
            color: white;
            padding: 15px 12px;
            text-align: left;
            cursor: pointer;
        }
        
        th:hover {
            background: #e67e22;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        tr:hover {
            background: #fef9f0;
        }
        
        /* Estados */
        .estado-select {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .estado-pendiente { background: #ffc107; color: #000; }
        .estado-procesando { background: #17a2b8; color: white; }
        .estado-enviado { background: #007bff; color: white; }
        .estado-entregado { background: #28a745; color: white; }
        .estado-cancelado { background: #dc3545; color: white; }
        
        /* Botones */
        .btn-estado {
            padding: 6px 12px;
            margin: 0 3px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn-ver {
            background: #f5a623;
            color: white;
        }
        
        .btn-wa {
            background: #25D366;
            color: white;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }
        
        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 550px;
            max-height: 85%;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            color: #f5a623;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .modal-content p {
            margin: 12px 0;
        }
        
        .modal-content ul {
            margin: 12px 0 12px 25px;
        }
        
        .cerrar-modal-btn {
            margin-top: 25px;
            padding: 12px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        
        @media (max-width: 768px) {
            .admin-header h1 { font-size: 18px; }
            .stats { padding: 15px; }
            .stat-card h3 { font-size: 24px; }
            th, td { font-size: 12px; padding: 8px; }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #28a745;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            z-index: 3000;
            animation: fadeOut 3s ease forwards;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <!-- Pantalla de Login SIMPLE -->
    <div class="login-container" id="loginContainer">
        <div class="login-form">
            <h2>🔐 Panel Administrador</h2>
            <p class="subtitle">Ingresa la contraseña de administrador</p>
            <input type="password" id="adminPassword" placeholder="Contraseña" onkeypress="if(event.key==='Enter') loginAdmin()">
            <button onclick="loginAdmin()">Acceder al panel</button>
            <div id="loginMessage"></div>
            <a href="index.html" class="volver-link">← Volver a la tienda</a>
        </div>
    </div>
    
    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="admin-header">
            <h1>📊 Papelería Emy - Panel de Administración</h1>
            <div class="user-info">
                <span>👤 Administrador</span>
                <button class="logout" onclick="logoutAdmin()">🚪 Cerrar Sesión</button>
            </div>
        </div>
        
        <div class="stats" id="stats">
            <div class="loading">📊 Cargando estadísticas...</div>
        </div>
        
        <div class="filtros">
            <input type="text" id="searchInput" placeholder="🔍 Buscar por nombre o teléfono..." onkeyup="filtrarPedidos()">
            <select id="estadoFilter" onchange="filtrarPedidos()">
                <option value="">📌 Todos los estados</option>
                <option value="pendiente">⏳ Pendiente</option>
                <option value="procesando">⚙️ Procesando</option>
                <option value="enviado">🚚 Enviado</option>
                <option value="entregado">✅ Entregado</option>
                <option value="cancelado">❌ Cancelado</option>
            </select>
            <input type="date" id="fechaFilter" onchange="filtrarPedidos()">
            <button onclick="cargarPedidos()">🔄 Actualizar</button>
        </div>
        
        <div class="pedidos-table">
            <table id="pedidosTable">
                <thead>
                    <tr>
                        <th onclick="ordenarPor('numero_pedido')">📋 Pedido</th>
                        <th onclick="ordenarPor('fecha')">📅 Fecha</th>
                        <th onclick="ordenarPor('cliente_nombre')">👤 Cliente</th>
                        <th onclick="ordenarPor('cliente_telefono')">📞 Teléfono</th>
                        <th onclick="ordenarPor('total')">💰 Total</th>
                        <th onclick="ordenarPor('estado')">📌 Estado</th>
                        <th>🔧 Acciones</th>
                    </tr>
                </thead>
                <tbody id="pedidosBody">
                    <tr><td colspan="7" class="loading">🔐 Inicia sesión para ver los pedidos</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Modal de Detalle -->
    <div id="detalleModal" class="modal">
        <div class="modal-content">
            <h2>📦 Detalle del Pedido</h2>
            <div id="detalleContenido"></div>
            <button class="cerrar-modal-btn" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========== CONFIGURACIÓN DE SUPABASE ==========
        const SUPABASE_URL = 'https://tngzvcyjonrqbdbxehar.supabase.co'
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRuZ3p2Y3lqb25ycWJkYnhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI4MjU0MTEsImV4cCI6MjA1ODQwMTQxMX0.p2aV0F3R5XvP_XgKPF-T6d9mTtUBF98gbwV4P_eo8aE'
        
        // Cliente de Supabase
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
        
        let pedidos = []
        let ordenActual = { columna: 'fecha', direccion: 'desc' }
        
        // ========== LOGIN SIMPLE ==========
        function loginAdmin() {
            const password = document.getElementById('adminPassword').value
            const messageDiv = document.getElementById('loginMessage')
            
            // Contraseña: admin123 (puedes cambiarla)
            if (password === 'admin123') {
                localStorage.setItem('admin_logged_in', 'true')
                messageDiv.innerHTML = '<div class="success-message">✅ Acceso correcto</div>'
                setTimeout(() => {
                    document.getElementById('loginContainer').style.display = 'none'
                    document.getElementById('dashboard').style.display = 'block'
                    cargarPedidos()
                }, 500)
            } else {
                messageDiv.innerHTML = '<div class="error-message">❌ Contraseña incorrecta</div>
                document.getElementById('adminPassword').value = ''
            }
        }
        
        function logoutAdmin() {
            localStorage.removeItem('admin_logged_in')
            location.reload()
        }
        
        // Verificar sesión al cargar
        window.onload = function() {
            const loggedIn = localStorage.getItem('admin_logged_in')
            if (loggedIn === 'true') {
                document.getElementById('loginContainer').style.display = 'none'
                document.getElementById('dashboard').style.display = 'block'
                cargarPedidos()
            }
        }
        
        // ========== FUNCIONES DE PEDIDOS ==========
        async function cargarPedidos() {
            const tbody = document.getElementById('pedidosBody')
            tbody.innerHTML = '<tr><td colspan="7" class="loading">🔄 Cargando pedidos...</td></tr>'
            
            const { data, error } = await supabaseClient
                .from('pedidos')
                .select('*')
                .order(ordenActual.columna, { ascending: ordenActual.direccion === 'asc' })
            
            if (error) {
                console.error('Error:', error)
                tbody.innerHTML = '<tr><td colspan="7" class="loading" style="color:red;">❌ Error: ' + error.message + '</td></tr>'
                return
            }
            
            pedidos = data || []
            mostrarPedidos(pedidos)
            actualizarEstadisticas(pedidos)
        }
        
        function mostrarPedidos(pedidosMostrar) {
            const tbody = document.getElementById('pedidosBody')
            
            if (!pedidosMostrar || pedidosMostrar.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">📭 No hay pedidos registrados</td></tr>'
                return
            }
            
            tbody.innerHTML = pedidosMostrar.map(pedido => `
                <tr>
                    <td style="font-weight: bold; font-size: 12px;">${pedido.numero_pedido || 'N/A'}</td>
                    <td>${pedido.fecha ? new Date(pedido.fecha).toLocaleDateString('es-MX') : 'N/A'}</td>
                    <td>${pedido.cliente_nombre || 'N/A'}</td>
                    <td>${pedido.cliente_telefono || 'N/A'}</td>
                    <td>$${(pedido.total || 0).toLocaleString()}</td>
                    <td>
                        <select class="estado-select estado-${pedido.estado || 'pendiente'}" 
                                onchange="cambiarEstado('${pedido.numero_pedido}', this.value)">
                            <option value="pendiente" ${pedido.estado === 'pendiente' ? 'selected' : ''}>⏳ Pendiente</option>
                            <option value="procesando" ${pedido.estado === 'procesando' ? 'selected' : ''}>⚙️ Procesando</option>
                            <option value="enviado" ${pedido.estado === 'enviado' ? 'selected' : ''}>🚚 Enviado</option>
                            <option value="entregado" ${pedido.estado === 'entregado' ? 'selected' : ''}>✅ Entregado</option>
                            <option value="cancelado" ${pedido.estado === 'cancelado' ? 'selected' : ''}>❌ Cancelado</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn-estado btn-ver" onclick="verDetalle('${pedido.numero_pedido}')">📋 Ver</button>
                        <button class="btn-estado btn-wa" onclick="copiarWhatsApp('${pedido.numero_pedido}')">💬 WA</button>
                    </td>
                </tr>
            `).join('')
        }
        
        async function cambiarEstado(numeroPedido, nuevoEstado) {
            const { error } = await supabaseClient
                .from('pedidos')
                .update({ estado: nuevoEstado, fecha_actualizacion: new Date().toISOString() })
                .eq('numero_pedido', numeroPedido)
            
            if (error) {
                mostrarToast('❌ Error: ' + error.message, 'error')
            } else {
                mostrarToast('✅ Estado actualizado a: ' + nuevoEstado, 'success')
                cargarPedidos()
            }
        }
        
        function verDetalle(numeroPedido) {
            const pedido = pedidos.find(p => p.numero_pedido === numeroPedido)
            if (!pedido) return
            
            const modal = document.getElementById('detalleModal')
            const contenido = document.getElementById('detalleContenido')
            
            let productosHtml = '<h3>📦 Productos:</h3><ul>'
            if (pedido.productos && pedido.productos.length > 0) {
                pedido.productos.forEach(p => {
                    productosHtml += `<li>${p.nombre} x${p.cantidad} - $${(p.subtotal || 0).toLocaleString()}</li>`
                })
            } else {
                productosHtml += '<li>No hay productos registrados</li>'
            }
            productosHtml += '</ul>'
            
            contenido.innerHTML = `
                <p><strong>📋 Pedido:</strong> ${pedido.numero_pedido}</p>
                <p><strong>📅 Fecha:</strong> ${pedido.fecha ? new Date(pedido.fecha).toLocaleString('es-MX') : 'N/A'}</p>
                <hr>
                <p><strong>👤 Cliente:</strong> ${pedido.cliente_nombre}</p>
                <p><strong>📞 Teléfono:</strong> ${pedido.cliente_telefono}</p>
                <p><strong>📍 Dirección:</strong> ${pedido.cliente_direccion}</p>
                <p><strong>🏙️ Ciudad:</strong> ${pedido.cliente_ciudad}, ${pedido.cliente_estado} CP ${pedido.cliente_cp}</p>
                <hr>
                ${productosHtml}
                <hr>
                <p><strong>💰 Subtotal:</strong> $${(pedido.subtotal || 0).toLocaleString()}</p>
                <p><strong>🚚 Envío:</strong> $${(pedido.costo_envio || 0).toLocaleString()}</p>
                <p><strong>💵 Total:</strong> $${(pedido.total || 0).toLocaleString()}</p>
                <p><strong>📌 Estado:</strong> ${pedido.estado}</p>
            `
            modal.style.display = 'block'
        }
        
        function copiarWhatsApp(numeroPedido) {
            const pedido = pedidos.find(p => p.numero_pedido === numeroPedido)
            if (!pedido) return
            
            let mensaje = `*PEDIDO ${pedido.numero_pedido} - PAPELERÍA EMY*%0A%0A`
            mensaje += `👤 *Cliente:* ${pedido.cliente_nombre}%0A`
            mensaje += `📞 *Teléfono:* ${pedido.cliente_telefono}%0A`
            mensaje += `📍 *Dirección:* ${pedido.cliente_direccion}%0A%0A`
            mensaje += `*Productos:*%0A`
            
            if (pedido.productos && pedido.productos.length > 0) {
                pedido.productos.forEach(p => {
                    mensaje += `• ${p.nombre} x${p.cantidad} - $${(p.subtotal || 0).toLocaleString()}%0A`
                })
            }
            
            mensaje += `%0A💰 *Total:* $${(pedido.total || 0).toLocaleString()}%0A`
            mensaje += `📌 *Estado:* ${pedido.estado}`
            
            window.open(`https://wa.me/52${pedido.cliente_telefono}?text=${mensaje}`)
            mostrarToast('📱 Abriendo WhatsApp...', 'success')
        }
        
        function actualizarEstadisticas(pedidosLista) {
            const totalPedidos = pedidosLista.length
            const totalVentas = pedidosLista.reduce((sum, p) => sum + (p.total || 0), 0)
            const pedidosPendientes = pedidosLista.filter(p => p.estado === 'pendiente').length
            const pedidosHoy = pedidosLista.filter(p => {
                if (!p.fecha) return false
                const hoy = new Date().toDateString()
                return new Date(p.fecha).toDateString() === hoy
            }).length
            
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <h4>📊 Total Pedidos</h4>
                    <h3>${totalPedidos}</h3>
                </div>
                <div class="stat-card">
                    <h4>💰 Total Ventas</h4>
                    <h3>$${totalVentas.toLocaleString()}</h3>
                </div>
                <div class="stat-card">
                    <h4>⏳ Pendientes</h4>
                    <h3>${pedidosPendientes}</h3>
                </div>
                <div class="stat-card">
                    <h4>📅 Pedidos Hoy</h4>
                    <h3>${pedidosHoy}</h3>
                </div>
            `
        }
        
        function filtrarPedidos() {
            const search = document.getElementById('searchInput').value.toLowerCase()
            const estado = document.getElementById('estadoFilter').value
            const fecha = document.getElementById('fechaFilter').value
            
            let filtrados = [...pedidos]
            
            if (search) {
                filtrados = filtrados.filter(p => 
                    (p.cliente_nombre && p.cliente_nombre.toLowerCase().includes(search)) ||
                    (p.cliente_telefono && p.cliente_telefono.includes(search)) ||
                    (p.numero_pedido && p.numero_pedido.toLowerCase().includes(search))
                )
            }
            
            if (estado) {
                filtrados = filtrados.filter(p => p.estado === estado)
            }
            
            if (fecha) {
                filtrados = filtrados.filter(p => {
                    if (!p.fecha) return false
                    const fechaPedido = new Date(p.fecha).toISOString().split('T')[0]
                    return fechaPedido === fecha
                })
            }
            
            mostrarPedidos(filtrados)
        }
        
        function ordenarPor(columna) {
            if (ordenActual.columna === columna) {
                ordenActual.direccion = ordenActual.direccion === 'asc' ? 'desc' : 'asc'
            } else {
                ordenActual.columna = columna
                ordenActual.direccion = 'asc'
            }
            cargarPedidos()
        }
        
        function cerrarModal() {
            document.getElementById('detalleModal').style.display = 'none'
        }
        
        function mostrarToast(mensaje, tipo) {
            const toast = document.createElement('div')
            toast.className = 'toast'
            toast.style.background = tipo === 'success' ? '#28a745' : '#dc3545'
            toast.textContent = mensaje
            document.body.appendChild(toast)
            setTimeout(() => toast.remove(), 3000)
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('detalleModal')
            if (event.target === modal) {
                modal.style.display = 'none'
            }
        }
    </script>
</body>
</html>
