<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papelería Emy</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <h1>🧡 Papelería Emy</h1>
  <p>Artículos, impresiones y trámites al instante</p>
  <input type="text" id="buscador" placeholder="🔍 Buscar productos...">
  <div id="filtros"></div>
</header>

<main>
  <div id="productos" class="grid"></div>
</main>

<!-- BOTÓN FLOTANTE -->
<div class="fab" onclick="toggleCarrito()">🛒</div>

<!-- PANEL CARRITO -->
<div id="panelCarrito" class="panel-carrito hidden">
  <h3>🛒 Tu carrito</h3>
  <ul id="listaCarrito"></ul>
  <p id="total"></p>
  <button onclick="pagar()">💳 Pagar</button>
  <button onclick="enviarWhatsApp()">📲 WhatsApp</button>
</div>

<!-- MODAL -->
<div id="ticketModal" class="modal hidden">
  <div class="modal-content">
    <h2>🧾 Tu pedido</h2>
    <div id="ticket"></div>
    <button onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
